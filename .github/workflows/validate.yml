name: "验证API链接"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # 每天凌晨2点运行
    - cron: '0 2 * * *'

env:
  FILENAME: ReadMe.md

jobs:
  validate:
    name: '验证README.md中的链接'
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          cd public-apis-zh
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: 验证链接
        run: |
          python scripts/validate_links.py ${FILENAME}
        continue-on-error: true

      - name: 检查格式
        run: |
          echo "检查Markdown格式..."
          python scripts/validate_format.py ${FILENAME}
          echo "格式检查完成"
